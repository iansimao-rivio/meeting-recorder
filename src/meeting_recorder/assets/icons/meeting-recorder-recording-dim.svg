<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Deep Purple Cat - Recording dim (dark maroon belly) -->
  <!-- Tail -->
  <path d="M17,52 Q8,50 7,42 Q6,36 10,34" fill="none" stroke="#6c5ce7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="32" cy="44" rx="16" ry="14" fill="#6c5ce7"/>
  <!-- Belly (dim maroon) -->
  <ellipse cx="32" cy="47" rx="10" ry="9" fill="#5D1616" opacity="0.6"/>
  <!-- Head -->
  <circle cx="32" cy="26" r="13" fill="#6c5ce7"/>
  <!-- Ears -->
  <polygon points="22,18 18,5 26,14" fill="#6c5ce7"/>
  <polygon points="42,18 46,5 38,14" fill="#6c5ce7"/>
  <!-- Inner ears -->
  <polygon points="23,17 20,8 25,14" fill="#a29bfe" opacity="0.4"/>
  <polygon points="41,17 44,8 39,14" fill="#a29bfe" opacity="0.4"/>
  <!-- Eyes -->
  <ellipse cx="27" cy="25" rx="4" ry="4.5" fill="#1a1a2e"/>
  <ellipse cx="37" cy="25" rx="4" ry="4.5" fill="#1a1a2e"/>
  <ellipse cx="27" cy="25" rx="1.5" ry="3.5" fill="#00cec9"/>
  <ellipse cx="37" cy="25" rx="1.5" ry="3.5" fill="#00cec9"/>
  <ellipse cx="27" cy="25" rx="0.6" ry="3" fill="#1a1a2e"/>
  <ellipse cx="37" cy="25" rx="0.6" ry="3" fill="#1a1a2e"/>
  <!-- Nose -->
  <polygon points="30.5,29 33.5,29 32,31" fill="#4834d4"/>
  <!-- Headphone band -->
  <path d="M19,22 Q19,10 32,7 Q45,10 45,22" fill="none" stroke="#fdcb6e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Headphone cups -->
  <rect x="14" y="20" width="7" height="9" rx="3" fill="#fdcb6e"/>
  <rect x="43" y="20" width="7" height="9" rx="3" fill="#fdcb6e"/>
  <!-- Mini notepad -->
  <rect x="46" y="38" width="10" height="13" rx="1.5" fill="white" opacity="0.8" transform="rotate(8, 51, 44)"/>
  <line x1="48" y1="42" x2="55" y2="42" stroke="#6c5ce7" stroke-width="1" transform="rotate(8, 51, 44)"/>
  <line x1="48" y1="45" x2="54" y2="45" stroke="#6c5ce7" stroke-width="1" transform="rotate(8, 51, 44)" opacity="0.5"/>
</svg>
