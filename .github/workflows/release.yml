# Release workflow — triggered by pushing a version tag or publishing a GitHub release
#
# One-time setup required:
#   1. Register the 'meeting-recorder' package on https://aur.archlinux.org
#   2. Generate an SSH key pair for AUR:
#        ssh-keygen -t ed25519 -f aur_key -N ""
#   3. Add the public key to your AUR account:
#        https://aur.archlinux.org/account/ → SSH Public Key
#   4. Add the private key as a GitHub repository secret:
#        Repository → Settings → Secrets → Actions → New secret
#        Name: AUR_SSH_PRIVATE_KEY
#        Value: contents of aur_key (then delete both key files)

name: Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev gir1.2-gtk-3.0 gir1.2-glib-2.0 libcairo2-dev pkg-config
      - name: Install and test
        run: |
          pip install PyGObject
          pip install .[dev]
          pytest tests/ -v

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Get version from tag
        id: version
        run: |
          # For release events, use the tag from the release; for push events, use GITHUB_REF_NAME
          TAG="${{ github.event.release.tag_name || github.ref_name }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build wheel and source dist
        run: |
          pip install build
          python -m build

      - name: Create source tarball
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          git archive --format=tar.gz --prefix="meeting-recorder-${VERSION}/" \
            -o "meeting-recorder-${VERSION}.tar.gz" HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          files: |
            dist/*.whl
            meeting-recorder-*.tar.gz
          generate_release_notes: true

  aur-publish:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ vars.AUR_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name || github.ref_name }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD version
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: meeting-recorder
          pkgbuild: ./PKGBUILD
          commit_username: "AJV009"
          commit_email: "noreply@github.com"
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
